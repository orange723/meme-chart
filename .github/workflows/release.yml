name: release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          BIN_NAME=meme-chart
          if [ "$GOOS" = "windows" ]; then
            BIN_NAME=meme-chart.exe
          fi
          go build -trimpath -ldflags "-s -w" -o "dist/${BIN_NAME}" .

      - name: Package
        run: |
          sudo apt-get update -y
          sudo apt-get install -y zip
          mkdir -p release
          # 复制未压缩二进制
          if [ "${{ matrix.goos }}" = "windows" ]; then
            cp dist/meme-chart.exe "release/meme-chart_${{ matrix.goos }}_${{ matrix.goarch }}.exe"
          else
            cp dist/meme-chart "release/meme-chart_${{ matrix.goos }}_${{ matrix.goarch }}"
          fi
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j "release/meme-chart_${{ matrix.goos }}_${{ matrix.goarch }}.zip" dist/meme-chart.exe
          else
            tar -czf "release/meme-chart_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz" -C dist meme-chart
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release_${{ matrix.goos }}_${{ matrix.goarch }}
          path: release/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: List Files
        run: ls -R release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
